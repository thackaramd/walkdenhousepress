<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walkden House Press</title>

<style>
body {
    margin: 0;
    background-color: #2B0906;
    font-family: 'Baskerville', 'Times New Roman', serif;
    color: #FBE8D6;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 35px 60px 20px 60px;
}

/* Title */
.title {
    font-size: 28px;
}

/* Desktop nav */
.nav {
    display: flex;
    gap: 25px;
    font-size: 20px;
}

.nav a {
    text-decoration: none;
    color: #FBE8D6;
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

/* line */
.line {
    height: 1px;
    background-color: #FBE8D6;
    width: 100%;
}

/* Quote area */
.quote-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 76px);
    padding: 0 20px;
    text-align: center;
}

/* FIX 1: stop mobile shrink + better compression */
.quote {
    font-size: 18px;
    line-height: 1.5;
    max-width: 600px;
    width: 100%;
    text-align: justify;
    text-align-last: center;
}

/* Hamburger */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 22px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 1.5px;
    background-color: #FBE8D6;
}

/* Mobile menu */
.mobile-menu {
    display: none;
    position: fixed;
    inset: 0;
    background-color: #FBE8D6;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.mobile-menu.show {
    display: flex;
    opacity: 1;
}

.mobile-menu a {
    color: #2B0906;
    text-decoration: none;
    font-size: 20px;
    margin: 16px 0;
}

/* FIX 2: proper X built from lines (matches hamburger weight) */
.close-icon {
    position: absolute;
    top: 22px;
    right: 22px;
    width: 22px;
    height: 22px;
    cursor: pointer;
}

.close-icon::before,
.close-icon::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1.5px;
    background-color: #2B0906;
}

.close-icon::before {
    transform: rotate(45deg);
}

.close-icon::after {
    transform: rotate(-45deg);
}

/* Responsive */
@media (max-width: 850px) {
    .header {
        padding: 35px 20px 20px 20px;
        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title {
        font-size: 20px;
    }

    /* IMPORTANT FIX: prevent font scaling on mobile entirely */
    .quote {
        font-size: 18px;
        max-width: 90%;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">Walkden House Press</div>

    <div class="nav">
        <a href="#">About</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
        <a href="#">Common Room</a>
        <a href="#">Contact</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div class="line"></div>

<div class="quote-container">
    <div class="quote">
        Walkden House Press is the publishing house behind The Parlour and Common Room, developing literary and educational projects grounded in attention, voice, and lived writing.
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <div class="close-icon" onclick="toggleMenu()"></div>

    <a href="#">About</a>
    <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
    <a href="#">Common Room</a>
    <a href="#">Contact</a>
</div>

<script>
function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('show');
}
</script>

</body>
</html>
