    <path stroke-width="13" d="M254 1067H625M254 1094H625"/>

    <!-- Knocker and handle. -->
    <ellipse stroke-width="10" cx="440" cy="814" rx="25" ry="31"/>
    <path stroke-width="9" d="M440 781v-26M421 841q19 26 38 0"/>
    <circle stroke-width="11" cx="579" cy="1068" r="18"/>

    <!-- Threshold and plinth. -->
    <path stroke-width="14" d="M111 1619H768"/>
    <path stroke-width="18" d="M91 1653H788"/>
    <path stroke-width="12" d="M72 1691H807"/>
    <path stroke-width="20" d="M66 1724H813"/>
  </g>
</svg>
