<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walkden House Press</title>

<style>
body {
    margin: 0;
    background-color: #2B0906;
    font-family: 'Baskerville', 'Times New Roman', serif;
    color: #FBE8D6;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 35px 60px 20px 60px;
}

.title {
    font-size: 28px;
}

.nav {
    display: flex;
    gap: 25px;
    font-size: 20px;
}

.nav a {
    text-decoration: none;
    color: #FBE8D6;
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

/* line */
.line {
    height: 1px;
    background-color: #FBE8D6;
    width: 100%;
}

/* Quote */
.quote-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 76px);
    padding: 0 20px;
    text-align: center;
}

.quote {
    font-size: 18px;
    line-height: 1.5;
    max-width: 600px;
    width: 100%;
    text-align: justify;
    text-align-last: center;
}

/* Hamburger */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 22px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 1.5px;
    background-color: #FBE8D6;
}

/* =========================
   MOBILE MENU (FIXED)
   ========================= */

/* Base state (hidden but animatable) */
.mobile-menu {
    position: fixed;
    inset: 0;
    background-color: #FBE8D6;
    z-index: 1000;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    opacity: 0;
    visibility: hidden;
    pointer-events: none;

    transition: opacity 0.35s ease, visibility 0.35s ease;
}

/* Visible state */
.mobile-menu.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

/* Top-right close button (aligned like hamburger) */
.mobile-menu-header {
    position: absolute;
    top: 35px;
    right: 20px;
}

.close-icon {
    width: 22px;
    height: 22px;
    cursor: pointer;
    position: relative;
}

.close-icon::before,
.close-icon::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1.5px;
    background-color: #2B0906;
}

.close-icon::before { transform: rotate(45deg); }
.close-icon::after { transform: rotate(-45deg); }

/* MENU LINKS (now perfectly centered block) */
.mobile-menu nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
}

.mobile-menu a {
    color: #2B0906;
    text-decoration: none;
    font-size: 20px;
}

/* Responsive */
@media (max-width: 850px) {
    .header {
        padding: 35px 20px 20px 20px;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title {
        font-size: 20px;
    }

    .quote {
        font-size: 18px;
        max-width: 90%;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">Walkden House Press</div>

    <div class="nav">
        <a href="#">About</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
        <a href="#">Common Room</a>
        <a href="#">Contact</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div class="line"></div>

<div class="quote-container">
    <div class="quote">
        Walkden House Press is the publishing house behind The Parlour and Common Room, developing literary and educational projects grounded in attention, voice, and lived writing.
    </div>
</div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">

    <div class="mobile-menu-header">
        <div class="close-icon" onclick="toggleMenu()"></div>
    </div>

    <nav>
        <a href="#">About</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
        <a href="#">Common Room</a>
        <a href="#">Contact</a>
    </nav>

</div>

<script>
function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('show');
}
</script>

</body>
</html>
