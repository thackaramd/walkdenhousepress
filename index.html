<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Walkden House Press</title>

<link
    rel="icon"
    type="image/png"
    href="images/favicon.png"
/>

<style>

:root {

    /* BACKGROUND */

    --bg: #15100F;

    /* TEXT */

    --text: #E7DDD3;
    --text-soft: rgba(231, 221, 211, 0.62);

    /* LINES */

    --line: rgba(231, 221, 211, 0.08);
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    min-height: 100%;
}

body {

    background: var(--bg);

    color: var(--text);

    font-family:
        "Baskerville",
        "Times New Roman",
        serif;

    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;

    overflow-x: hidden;
}

/* SUBTLE PAPER GRAIN */

body::before {

    content: "";

    position: fixed;
    inset: 0;

    pointer-events: none;

    opacity: 0.014;

    background-image:
        url("https://www.transparenttextures.com/patterns/asfalt-light.png");
}

/* HEADER */

.header {

    width: 100%;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding:
        26px
        64px
        22px;

    position: relative;
    z-index: 2;
}

/* BRAND */

.brand {

    display: flex;
    align-items: center;

    gap: 14px;

    text-decoration: none;
    color: inherit;
}

.brand img {

    width: 46px;
    height: auto;

    display: block;

    opacity: 0.34;
}

.brand-text {

    display: flex;
    flex-direction: column;
}

.brand-title {

    font-size: 1.5rem;

    letter-spacing: 0.15px;
}

.brand-subtitle {

    margin-top: 3px;

    font-size: 0.62rem;

    letter-spacing: 1.1px;
    text-transform: uppercase;

    color: var(--text-soft);
}

/* NAV */

.nav {

    display: flex;
    align-items: center;

    gap: 28px;
}

.nav a {

    color: var(--text-soft);

    text-decoration: none;

    font-size: 0.92rem;

    transition: opacity 0.2s ease;
}

.nav a:hover {
    opacity: 0.78;
}

/* LINE */

.line {

    width: calc(100% - 72px);
    height: 1px;

    margin: 0 auto;

    background:
        linear-gradient(
            to right,
            transparent,
            var(--line),
            transparent
        );
}

/* MAIN */

main {

    width: 100%;

    display: flex;
    justify-content: center;

    padding:
        100px
        32px
        140px;
}

/* PUBLICATIONS */

.publications {

    width: 100%;
    max-width: 1040px;

    display: grid;
    grid-template-columns: repeat(2, minmax(280px, 1fr));

    gap: 84px;

    align-items: start;
}

/* ITEM */

.publication {

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* COVER */

.cover-link {

    display: block;

    text-decoration: none;
}

.cover {

    width: 100%;
    max-width: 440px;

    display: block;

    box-shadow:
        0 14px 40px rgba(0,0,0,0.28);

    transition:
        transform 0.3s ease,
        opacity 0.3s ease;
}

.cover:hover {

    transform: translateY(-2px);

    opacity: 0.96;
}

/* META */

.meta {

    margin-top: 28px;

    text-align: center;
}

.meta-title {

    font-size: 1rem;

    letter-spacing: 0.4px;
}

.meta-subtitle {

    margin-top: 6px;

    font-size: 0.78rem;

    color: var(--text-soft);

    letter-spacing: 0.6px;
}

.meta-note {

    margin-top: 14px;

    font-size: 0.88rem;

    font-style: italic;

    color: var(--text-soft);

    line-height: 1.7;
}

/* FOOTER */

.footer {

    padding:
        0
        24px
        44px;

    text-align: center;

    font-size: 0.78rem;

    color: var(--text-soft);
}

/* ACCESSIBILITY */

a:focus-visible {

    outline: 1px solid rgba(231,221,211,0.4);
    outline-offset: 4px;
}

/* TABLET */

@media (max-width: 980px) {

    .publications {

        gap: 54px;
    }

    .header {

        padding:
            24px
            34px
            20px;
    }

    .line {

        width: calc(100% - 48px);
    }
}

/* MOBILE */

@media (max-width: 760px) {

    .header {

        flex-direction: column;
        align-items: flex-start;

        gap: 22px;

        padding:
            22px
            22px
            18px;
    }

    .nav {

        gap: 18px;

        flex-wrap: wrap;
    }

    .line {

        width: calc(100% - 36px);
    }

    main {

        padding:
            56px
            22px
            100px;
    }

    .publications {

        grid-template-columns: 1fr;

        gap: 70px;
    }

    .brand-title {

        font-size: 1.18rem;
    }

    .brand img {

        width: 40px;
    }
}

</style>
</head>

<body>

<header class="header">

    <a
        href="index.html"
        class="brand"
        aria-label="Walkden House Press Home"
    >

        <img
            src="images/colophon.png"
            alt="Walkden House Press logo"
        >

        <div class="brand-text">

            <div class="brand-title">
                Walkden House Press
            </div>

            <div class="brand-subtitle">
                Publications and printed works
            </div>

        </div>

    </a>

    <nav class="nav">

        <a href="#">
            About
        </a>

        <a
            href="https://theparlour.org.uk"
            target="_blank"
            rel="noopener"
        >
            The Parlour
        </a>

        <a href="#">
            Common Room
        </a>

        <a href="#">
            Contact
        </a>

    </nav>

</header>

<div class="line"></div>

<main>

    <section class="publications">

        <!-- THE PARLOUR -->

        <article class="publication">

            <a
                href="theparlour.html"
                class="cover-link"
            >

                <img
                    src="images/theparlour-cover.jpg"
                    alt="The Parlour publication cover"
                    class="cover"
                >

            </a>

            <div class="meta">

                <div class="meta-title">
                    <em>The Parlour</em>
                </div>

                <div class="meta-subtitle">
                    Bedford
                </div>

                <div class="meta-note">
                    A place to meet and be met.
                </div>

            </div>

        </article>

        <!-- COMMON ROOM -->

        <article class="publication">

            <a
                href="commonroom.html"
                class="cover-link"
            >

                <img
                    src="images/commonroom-cover.jpg"
                    alt="Common Room publication cover"
                    class="cover"
                >

            </a>

            <div class="meta">

                <div class="meta-title">
                    <em>Common Room</em>
                </div>

                <div class="meta-subtitle">
                    Mark Rutherford School
                </div>

                <div class="meta-note">
                    No. 1
                </div>

            </div>

        </article>

    </section>

</main>

<footer class="footer">

    Walkden House Press

</footer>

</body>
</html>
