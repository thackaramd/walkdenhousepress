<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="images/favicon.png">

<title>Walkden House Press</title>

<style>
:root {
    --bg: #2B0906;
    --bg-deep: #1f0503;
    --bg-warm: #3a0d09;

    --text: #F4E6D7;
    --text-soft: rgba(244, 230, 215, 0.76);

    --accent: #D6B39F;

    --line: rgba(244, 230, 215, 0.16);
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    height: 100%;
}

body {
    font-family: "Baskerville", "Times New Roman", serif;
    color: var(--text);

    min-height: 100vh;

    display: flex;
    flex-direction: column;

    background:
        radial-gradient(
            circle at top,
            var(--bg-warm) 0%,
            var(--bg) 42%,
            var(--bg-deep) 100%
        );

    overflow-x: hidden;

    position: relative;
}

/* SUBTLE PAPER GRAIN */

body::before {
    content: "";

    position: fixed;
    inset: 0;

    pointer-events: none;

    opacity: 0.045;

    background-image:
        url("https://www.transparenttextures.com/patterns/asfalt-light.png");
}

/* HEADER */

.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;

    padding: 28px 64px 22px;

    gap: 32px;

    position: relative;
    z-index: 2;
}

/* BRAND */

.title-wrapper {
    display: flex;
    align-items: center;

    gap: 18px;

    min-width: 0;
}

.title-wrapper img {
    width: 62px;
    height: auto;

    display: block;

    opacity: 0.88;

    flex-shrink: 0;
}

.title {
    font-size: 1.72rem;

    letter-spacing: 0.25px;

    color: var(--text);

    transform: translateY(1px);

    white-space: nowrap;
}

/* NAVIGATION */

.nav {
    display: flex;

    gap: 32px;

    font-size: 1.15rem;

    letter-spacing: 0.35px;

    flex-shrink: 1;

    white-space: nowrap;

    padding-bottom: 4px;
}

.nav a {
    text-decoration: none;

    color: var(--text-soft);

    transition:
        color 0.25s ease,
        opacity 0.25s ease;
}

.nav a:hover {
    color: var(--accent);
}

.nav a.italic {
    font-style: italic;
}

/* DIVIDER */

.line {
    height: 1px;

    width: calc(100% - 72px);

    margin: 0 auto;

    background:
        linear-gradient(
            to right,
            transparent,
            var(--line),
            transparent
        );
}

/* MAIN */

main {
    flex: 1;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 40px 24px;

    position: relative;
    z-index: 2;
}

/* HERO TEXT */

.quote {
    max-width: 560px;

    font-size: 1.55rem;

    line-height: 1.9;

    text-align: center;

    letter-spacing: 0.15px;

    color: var(--text);

    text-wrap: balance;
}

/* SUBTLE FADE */

.quote,
.header,
.line {
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(6px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* HAMBURGER */

.hamburger {
    display: none;

    flex-direction: column;
    justify-content: space-between;

    width: 22px;
    height: 15px;

    cursor: pointer;
}

.hamburger div {
    height: 1px;

    background-color: var(--text);
}

/* MOBILE MENU */

.mobile-menu {
    position: fixed;
    inset: 0;

    background-color: #F3E2D6;

    z-index: 1000;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: center;

    opacity: 0;
    visibility: hidden;
    pointer-events: none;

    transition:
        opacity 0.35s ease,
        visibility 0.35s ease;
}

.mobile-menu.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

.mobile-menu-header {
    position: absolute;

    top: 32px;
    right: 22px;
}

.close-icon {
    width: 22px;
    height: 22px;

    cursor: pointer;

    position: relative;
}

.close-icon::before,
.close-icon::after {
    content: "";

    position: absolute;

    top: 50%;
    left: 0;

    width: 100%;
    height: 1px;

    background-color: var(--bg);
}

.close-icon::before {
    transform: rotate(45deg);
}

.close-icon::after {
    transform: rotate(-45deg);
}

.mobile-menu nav {
    display: flex;
    flex-direction: column;

    align-items: center;

    gap: 24px;
}

.mobile-menu a {
    color: var(--bg);

    text-decoration: none;

    font-size: 1.5rem;
}

/* ACCESSIBILITY */

a:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 4px;
}

/* COMPRESSED DESKTOP / TABLET */

@media (max-width: 1100px) {

    .header {
        padding: 24px 36px 20px;
        gap: 20px;
    }

    .title-wrapper {
        gap: 14px;
    }

    .title-wrapper img {
        width: 54px;
    }

    .title {
        font-size: 1.4rem;
    }

    .nav {
        gap: 22px;

        font-size: 1rem;

        letter-spacing: 0.2px;
    }

    .line {
        width: calc(100% - 48px);
    }

    .quote {
        font-size: 1.4rem;
    }
}

/* MOBILE */

@media (max-width: 760px) {

    .header {
        padding: 18px 22px 18px;

        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title-wrapper {
        gap: 12px;
    }

    .title {
        font-size: 1.15rem;
    }

    .title-wrapper img {
        width: 48px;
    }

    .quote {
        font-size: 1.2rem;

        line-height: 1.75;

        max-width: 92%;
    }

    .line {
        width: calc(100% - 36px);
    }

    main {
        padding: 40px 20px;
    }
}
</style>
</head>

<body>

<header class="header">

    <div class="title-wrapper" aria-label="Walkden House Press">

        <img
            src="images/colophon.png"
            alt="Walkden House Press logo"
        >

        <div class="title">
            Walkden House Press
        </div>

    </div>

    <nav class="nav">

        <a href="#">
            About
        </a>

        <a
            href="https://theparlour.org.uk"
            target="_blank"
            rel="noopener"
        >
            The Parlour
        </a>

        <a href="#">
            Common Room
        </a>

        <a href="#">
            Contact
        </a>

    </nav>

    <div
        class="hamburger"
        onclick="toggleMenu()"
        aria-label="Open menu"
    >
        <div></div>
        <div></div>
        <div></div>
    </div>

</header>

<div class="line"></div>

<main>

    <div class="quote">
        Walkden House Press is the publishing house behind
        The Parlour and Common Room, developing literary
        and educational projects grounded in attention,
        voice, and lived writing.
    </div>

</main>

<!-- MOBILE MENU -->

<div
    class="mobile-menu"
    id="mobileMenu"
>

    <div class="mobile-menu-header">

        <div
            class="close-icon"
            onclick="toggleMenu()"
            aria-label="Close menu"
        ></div>

    </div>

    <nav>

        <a href="#">
            About
        </a>

        <a
            href="https://theparlour.org.uk"
            class="italic"
            target="_blank"
            rel="noopener"
        >
            The Parlour
        </a>

        <a href="#">
            Common Room
        </a>

        <a href="#">
            Contact
        </a>

    </nav>

</div>

<script>
function toggleMenu() {
    document
        .getElementById('mobileMenu')
        .classList
        .toggle('show');
}
</script>

</body>
</html>
