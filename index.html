<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walkden House Press</title>

<style>
:root {
    --bg: #2B0906;
    --text: #FBE8D6;
    --text-soft: rgba(251, 232, 214, 0.75);
    --accent: #D8B8A6;
}

body {
    margin: 0;
    background-color: var(--bg);
    font-family: "Baskerville", "Times New Roman", serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;

    /* REDUCED TOP PADDING */
    padding: 12px 60px 18px 60px;

    gap: 20px;
}

/* TITLE + LOGO */
.title-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.title-wrapper img {
    width: 64px;
    height: auto;

    /* REMOVES EXTRA INLINE IMAGE SPACE */
    display: block;
}

.title {
    font-size: 24px;
    letter-spacing: 0.2px;
}

/* NAV */
.nav {
    display: flex;
    gap: 25px;
    font-size: 20px;
    padding-bottom: 6px;
}

.nav a {
    text-decoration: none;
    color: var(--text);
    transition: color 0.2s ease;
}

.nav a:hover {
    color: var(--accent);
}

.nav a.italic {
    font-style: italic;
}

/* DIVIDER */
.line {
    height: 2px;
    background-color: rgba(251, 232, 214, 0.35);
    width: 100%;
}

/* MAIN */
main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.quote {
    max-width: 640px;
    font-size: 18px;
    line-height: 1.65;
    text-align: center;
}

/* HAMBURGER */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 22px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 1.5px;
    background-color: var(--text);
}

/* MOBILE MENU */
.mobile-menu {
    position: fixed;
    inset: 0;
    background-color: #F3E2D6;
    z-index: 1000;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    opacity: 0;
    visibility: hidden;
    pointer-events: none;

    transition: opacity 0.35s ease, visibility 0.35s ease;
}

.mobile-menu.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

.mobile-menu-header {
    position: absolute;
    top: 35px;
    right: 20px;
}

.close-icon {
    width: 22px;
    height: 22px;
    cursor: pointer;
    position: relative;
}

.close-icon::before,
.close-icon::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1.5px;
    background-color: var(--bg);
}

.close-icon::before {
    transform: rotate(45deg);
}

.close-icon::after {
    transform: rotate(-45deg);
}

.mobile-menu nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
}

.mobile-menu a {
    color: var(--bg);
    text-decoration: none;
    font-size: 20px;
}

/* ACCESSIBILITY */
a:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 4px;
}

/* RESPONSIVE */
@media (max-width: 850px) {

    .header {

        /* REDUCED MOBILE TOP PADDING */
        padding: 10px 20px 16px 20px;

        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title {
        font-size: 18px;
    }

    .title-wrapper img {
        width: 52px;
    }

    .quote {
        font-size: 17px;
        max-width: 92%;
    }
}
</style>
</head>

<body>

<header class="header">

    <div class="title-wrapper">
        <img src="images/colophon.png" alt="Walkden House Press logo">

        <div class="title">
            Walkden House Press
        </div>
    </div>

    <nav class="nav">
        <a href="#">About</a>

        <a href="https://theparlour.org.uk"
           target="_blank"
           rel="noopener">
           The Parlour
        </a>

        <a href="#">Common Room</a>

        <a href="#">Contact</a>
    </nav>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

</header>

<div class="line"></div>

<main>
    <div class="quote">
        Walkden House Press is the publishing house behind
        The Parlour and Common Room, developing literary
        and educational projects grounded in attention,
        voice, and lived writing.
    </div>
</main>

<!-- MOBILE MENU -->

<div class="mobile-menu" id="mobileMenu">

    <div class="mobile-menu-header">
        <div class="close-icon" onclick="toggleMenu()"></div>
    </div>

    <nav>
        <a href="#">About</a>

        <a href="https://theparlour.org.uk"
           class="italic"
           target="_blank"
           rel="noopener">
           The Parlour
        </a>

        <a href="#">Common Room</a>

        <a href="#">Contact</a>
    </nav>

</div>

<script>
function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('show');
}
</script>

</body>
</html>
